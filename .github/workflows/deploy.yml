# ============================================================
# .github/workflows/deploy.yml
# Terraform CI/CD pipeline for Azure Cost Visibility Dashboard
# All jobs use PowerShell (pwsh) as the shell.
# ============================================================

name: Deploy Cost Visibility Dashboard

# TRIGGERS
on:
  push:
    branches:
      - main
  # Manual trigger — needed for the destroy job.
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "apply"
        type: choice
        options:
          - apply
          - destroy

# AZURE CREDENTIALS
# These four ARM_* variables are read automatically by the
# Terraform azurerm provider at runtime. The TF_VAR_* variables
# are read automatically by Terraform and mapped to matching
# input variables in variables.tf.
env:
  ARM_CLIENT_ID:         ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:     ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID:   ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:         ${{ secrets.ARM_TENANT_ID }}
  TF_VAR_subscription_id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  TF_VAR_owner_email:     ${{ secrets.TF_VAR_OWNER_EMAIL }}

jobs:

  # ─── JOB 1: VALIDATE ───────────────────────────────────────
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    # Only run validate/plan/apply when action is "apply".
    if: github.event_name == 'push' || inputs.action == 'apply'

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  # ─── JOB 2: PLAN ───────────────────────────────────────────
  plan:
    name: Plan Terraform
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || inputs.action == 'apply'

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan.out

      - name: Upload plan artefact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan.out
          retention-days: 1

  # ─── JOB 3: APPLY ──────────────────────────────────────────
  apply:
    name: Apply Terraform
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' || inputs.action == 'apply'

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Download plan artefact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.out

  # ─── JOB 4: DESTROY ────────────────────────────────────────
  # Only runs when you manually trigger the workflow and pick
  # "destroy" from the dropdown. Never runs on git push.
  destroy:
    name: Destroy Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
